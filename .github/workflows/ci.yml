name: ci
on:
  push: {branches: [main]}
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Validate
        run: |
          python -m pip install --upgrade pip build
          python -c "import ast,glob; [ast.parse(open(f).read()) for f in glob.glob('server.py')]"
          python -m build .
